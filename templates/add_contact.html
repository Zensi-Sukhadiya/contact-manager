{% extends 'base.html' %}

{% block css %}
<link rel="stylesheet" href="{{ url_for('static', filename='forms.css') }}">
{% endblock %}

{% block content %}
<div class="form-wrapper">
    <div class="main-card shadow-sm">
        <div class="form-header">
            <h1 class="form-title">
                <div class="form-icon-bg">
                    <i class="bi bi-person-plus-fill"></i>
                </div>
                Add New Contact
            </h1>
        </div>

        <form method="POST">
            <div class="row g-4">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="custom-label">
                            <i class="bi bi-person-vcard"></i> Full Name
                        </label>
                        <input type="text" class="form-control custom-input" name="name" placeholder="e.g. John Doe" required>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="custom-label">
                            <i class="bi bi-telephone"></i> Phone Number
                        </label>
                        <input type="text" class="form-control custom-input" name="phone" placeholder="e.g. 1234567890" required>
                    </div>
                </div>

                <div class="col-12">
                    <div class="mb-3">
                        <label class="custom-label">
                            <i class="bi bi-envelope"></i> Email Address
                        </label>
                        <input type="email" class="form-control custom-input" name="email" placeholder="e.g. john@example.com">
                    </div>
                </div>

                <div class="col-12">
                    <div class="mb-3">
                        <label class="custom-label">
                            <i class="bi bi-geo-alt"></i> Physical Address
                        </label>
                        <textarea class="form-control custom-input" name="address" rows="3" placeholder="Enter full address..."></textarea>
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-save">
                    <i class="bi bi-check2-circle"></i> Save Contact
                </button>
                <a href="/" class="btn-cancel">
                    <i class="bi bi-x-circle"></i> Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
